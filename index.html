<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Geo-AR: Monster Catcher</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; videoSettings: { facingMode: 'environment' };"
    >
      <a-assets>
        <a-asset-item id="m1" src="monstruo1.glb"></a-asset-item>
        <a-asset-item id="m2" src="monstruo2.glb"></a-asset-item>
        <a-asset-item id="m3" src="monstruo3.glb"></a-asset-item>
      </a-assets>

      <a-entity 
        gps-entity-place="latitude: -16.52464396841622; longitude: -68.11233239601863;" 
        look-at="[gps-camera]">
        <a-gltf-model 
          src="#m1" 
          scale="0.8 0.8 0.8"
          animation="property: position; to: 0 0.5 0; dur: 2000; dir: alternate; loop: true">
        </a-gltf-model>
        <a-text value="PUERTA PRINCIPAL\nLv. 15" align="center" position="0 2.5 0" scale="2.5 2.5 2.5" color="#FFD700"></a-text>
      </a-entity>

      <a-entity 
        gps-entity-place="latitude: -16.524540172936938; longitude: -68.11230754895388;" 
        look-at="[gps-camera]">
        <a-gltf-model 
          src="#m2" 
          scale="0.8 0.8 0.8"
          animation="property: position; to: 0 0.4 0; dur: 1500; dir: alternate; loop: true">
        </a-gltf-model>
        <a-text value="BIBLIOTECA\nLv. 30" align="center" position="0 2.5 0" scale="2.5 2.5 2.5" color="#00FF00"></a-text>
      </a-entity>

      <a-entity 
        gps-entity-place="latitude: -16.524480387226562; longitude: -68.11229683990479;" 
        look-at="[gps-camera]">
        <a-gltf-model 
          src="#m3" 
          scale="0.8 0.8 0.8"
          animation="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear">
        </a-gltf-model>
        <a-text value="BAÑOS\nLv. 5" align="center" position="0 2.5 0" scale="2.5 2.5 2.5" color="#FF0000"></a-text>
      </a-entity>

      <a-camera gps-camera rotation-reader> </a-camera>
    </a-scene>
  </body>
</html>
